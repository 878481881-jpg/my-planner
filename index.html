<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>每日计划管家 Pro - Enhanced Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ios-blue: #007AFF; --ios-bg: #f2f2f7; }
        body { background-color: var(--ios-bg); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; -webkit-tap-highlight-color: transparent; padding-bottom: 100px; }
        .tab-content { display: none; animation: fadeIn 0.3s ease-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-radius: 16px; border: 1px solid rgba(0, 0, 0, 0.05); box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04); }
        .tab-bar { background: rgba(255, 255, 255, 0.85); backdrop-filter: saturate(180%) blur(20px); border-top: 0.5px solid rgba(0, 0, 0, 0.1); padding-bottom: env(safe-area-inset-bottom); }
        .tab-item { color: #8e8e93; transition: color 0.2s; }
        .tab-item.active { color: var(--ios-blue); }
        
        #loginOverlay { position: fixed; inset: 0; background: var(--ios-bg); z-index: 9999; display: flex; items-center; justify-content: center; }
        .date-strip { display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .date-card { flex: 0 0 60px; height: 75px; margin-right: 10px; border-radius: 14px; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.2s; }
        .date-card.active { background: var(--ios-blue); color: white; transform: scale(1.05); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input, select, textarea { font-size: 16px !important; }
        .mood-btn { filter: grayscale(100%); opacity: 0.5; transition: all 0.3s; }
        .mood-btn.active { filter: grayscale(0%); opacity: 1; transform: scale(1.2); }

        /* 智能建议样式 */
        .suggestion-chip { background: #eef2ff; color: #4f46e5; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; border: 1px solid #c7d2fe; white-space: nowrap; }
    </style>
</head>
<body>

    <!-- 登录 -->
    <div id="loginOverlay">
        <div class="w-full max-w-sm px-8">
            <div class="text-center mb-10">
                <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-xl">
                    <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-5.19 4.595-9.362 9.78-9.362 1.43 0 2.797.313 4.026.879m2.281 2.281c.566 1.229.879 2.596.879 4.026 0 1.281-.25 2.502-.7 3.616m-1.215 3.041A12.965 12.965 0 0112 21c-4.477 0-8.268-2.943-9.542-7"></path></svg>
                </div>
                <h2 class="text-2xl font-black text-slate-800">每日计划管家</h2>
                <p class="text-slate-400 text-sm mt-1">登录即享自动同步</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="loginUser" class="w-full p-4 rounded-2xl border-none bg-white shadow-sm" placeholder="账号">
                <input type="password" id="loginPass" class="w-full p-4 rounded-2xl border-none bg-white shadow-sm" placeholder="密码">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">进入系统</button>
            </div>
        </div>
    </div>

    <!-- 顶部 -->
    <div id="syncStatus" class="bg-blue-600 text-white text-[10px] px-4 py-1 flex justify-between items-center font-bold sticky top-0 z-[100]">
        <span id="syncText">等待登录...</span>
        <div class="flex gap-3">
            <span id="currentUserDisplay">--</span>
            <button onclick="logout()" class="underline">注销</button>
        </div>
    </div>

    <header class="pt-6 pb-4 bg-[#f2f2f7]">
        <div class="px-6 flex justify-between items-center mb-4">
            <h1 class="text-2xl font-bold text-slate-900">我的日程</h1>
            <button onclick="manualSync()" class="bg-white p-2 rounded-full shadow-sm border border-slate-100">
                <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
        </div>
        <div id="dateStrip" class="date-strip no-scrollbar px-6 pb-2"></div>
        <input type="date" id="datePicker" class="hidden">
    </header>

    <main class="px-4 pb-24">
        <!-- 列表 -->
        <section id="tab-list" class="tab-content active">
            <div id="planList" class="space-y-4 mb-8"></div>
            
            <div class="glass-card p-5 mt-8 border-t-4 border-purple-500">
                <h3 class="font-bold text-slate-800 mb-4">心情日志</h3>
                <div class="flex justify-between bg-slate-50 p-2 rounded-xl mb-4">
                    <button onclick="setMood('🤩')" class="mood-btn text-2xl" id="mood-🤩">🤩</button>
                    <button onclick="setMood('😊')" class="mood-btn text-2xl" id="mood-😊">😊</button>
                    <button onclick="setMood('😐')" class="mood-btn text-2xl" id="mood-😐">😐</button>
                    <button onclick="setMood('😴')" class="mood-btn text-2xl" id="mood-😴">😴</button>
                    <button onclick="setMood('😫')" class="mood-btn text-2xl" id="mood-😫">😫</button>
                </div>
                <textarea id="dailySummaryText" rows="3" onblur="saveCurrentSummary()" class="w-full rounded-xl border-none bg-slate-50 p-3 text-sm" placeholder="记录这一天的感受..."></textarea>
            </div>
        </section>

        <!-- 添加 -->
        <section id="tab-add" class="tab-content">
            <div class="glass-card p-5 space-y-5">
                <div>
                    <label class="block text-[10px] font-bold text-slate-400 uppercase mb-2">常用计划快捷选择</label>
                    <div id="suggestionBox" class="flex flex-wrap gap-2 max-h-32 overflow-y-auto no-scrollbar">
                        <!-- 智能建议由JS生成 -->
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <select id="startHour" class="w-full rounded-xl border-none bg-slate-100 p-3"></select>
                    <select id="endHour" class="w-full rounded-xl border-none bg-slate-100 p-3"></select>
                </div>
                <select id="planCategory" class="w-full rounded-xl border-none bg-slate-100 p-3">
                    <option value="学习">📚 学习/工作</option>
                    <option value="健身">💪 健身/运动</option>
                    <option value="娱乐">🎮 娱乐/放松</option>
                    <option value="生活">🏠 生活/日常</option>
                </select>
                <textarea id="planContent" rows="2" class="w-full rounded-xl border-none bg-slate-100 p-4" placeholder="任务名称..."></textarea>
                <button id="addBtn" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg active:scale-95 transition-transform">添加到日程</button>
            </div>
        </section>

        <!-- 历史流水与统计 -->
        <section id="tab-data" class="tab-content">
            <div class="glass-card p-5 mb-4">
                <h3 class="text-sm font-bold text-slate-800 mb-4 uppercase">分类活跃度</h3>
                <div id="categoryChart" class="space-y-4"></div>
            </div>
            
            <div class="glass-card p-5">
                <h3 class="text-sm font-bold text-slate-800 mb-4 uppercase">全账号历史流水</h3>
                <div id="fullHistoryList" class="space-y-6">
                    <!-- 流水记录渲染处 -->
                </div>
            </div>
        </section>

        <!-- 设置 -->
        <section id="tab-settings" class="tab-content">
            <div class="glass-card p-5 space-y-4">
                <h3 class="font-bold">云端连接配置</h3>
                <input type="password" id="ghToken" class="w-full p-3 bg-slate-100 rounded-lg text-xs" placeholder="GitHub Token">
                <input type="text" id="ghUser" class="w-full p-3 bg-slate-100 rounded-lg text-xs" placeholder="用户名">
                <input type="text" id="ghRepo" class="w-full p-3 bg-slate-100 rounded-lg text-xs" placeholder="仓库名">
                <button onclick="saveGHConfig()" class="w-full py-3 bg-slate-800 text-white rounded-xl font-bold">保存并重载</button>
            </div>
        </section>
    </main>

    <nav class="tab-bar fixed bottom-0 left-0 right-0 h-16 flex justify-around items-center z-50">
        <button onclick="switchTab('list')" class="tab-item active flex flex-col items-center gap-1"><span class="text-[10px] font-bold">日程</span></button>
        <button onclick="switchTab('add')" class="tab-item flex flex-col items-center gap-1"><span class="text-[10px] font-bold">添加</span></button>
        <button onclick="switchTab('data')" class="tab-item flex flex-col items-center gap-1"><span class="text-[10px] font-bold">流水</span></button>
        <button onclick="switchTab('settings')" class="tab-item flex flex-col items-center gap-1"><span class="text-[10px] font-bold">设置</span></button>
    </nav>

    <div id="toast" class="fixed top-12 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-2 rounded-full opacity-0 transition-opacity z-[100] text-xs"></div>

    <script>
        // 配置
        const PRESET_GH_CONFIG = {
            token: "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", // 开发者填入
            user: "878481881-jpg",
            repo: "my-planner",
            file: "main_database.json"
        };

        let globalDB = { accounts: {} };
        let currentUser = null;
        let ghConfig = JSON.parse(localStorage.getItem('gh_sync_config')) || PRESET_GH_CONFIG;
        let currentFileSha = null;

        window.onload = async () => {
            initTimeSelectors();
            initDateStrip();
            document.getElementById('ghToken').value = ghConfig.token;
            document.getElementById('ghUser').value = ghConfig.user;
            document.getElementById('ghRepo').value = ghConfig.repo;

            const saved = localStorage.getItem('last_sync_acc');
            if (saved) {
                const { u, p } = JSON.parse(saved);
                document.getElementById('loginUser').value = u;
                document.getElementById('loginPass').value = p;
                handleLogin();
            }
        };

        // --- 核心账号 ---
        async function handleLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            if(!user || !pass) return;

            setSyncUI(true, "拉取云端数据...");
            await fetchGlobalDB();

            if(!globalDB.accounts) globalDB.accounts = {};

            if(globalDB.accounts[user]) {
                if(globalDB.accounts[user].password !== pass) {
                    setSyncUI(false, "密码错误");
                    return;
                }
            } else {
                globalDB.accounts[user] = { password: pass, plans: {}, summaries: {} };
                await pushGlobalDB();
            }

            currentUser = user;
            localStorage.setItem('last_sync_acc', JSON.stringify({ u: user, p: pass }));
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('currentUserDisplay').innerText = user;
            setSyncUI(false, "已连接");
            renderAll();
        }

        function logout() { localStorage.removeItem('last_sync_acc'); location.reload(); }

        // --- 同步逻辑 ---
        async function fetchGlobalDB() {
            if(!ghConfig.token) return;
            try {
                const url = `https://api.github.com/repos/${ghConfig.user}/${ghConfig.repo}/contents/${ghConfig.file}`;
                const res = await fetch(url, { headers: { 'Authorization': `token ${ghConfig.token}` } });
                if(res.ok) {
                    const data = await res.json();
                    currentFileSha = data.sha;
                    globalDB = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                }
            } catch(e) {}
        }

        async function pushGlobalDB() {
            if(!ghConfig.token || !currentUser) return;
            try {
                const url = `https://api.github.com/repos/${ghConfig.user}/${ghConfig.repo}/contents/${ghConfig.file}`;
                const content = btoa(unescape(encodeURIComponent(JSON.stringify(globalDB))));
                await fetch(url, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${ghConfig.token}` },
                    body: JSON.stringify({ message: "Sync", content, sha: currentFileSha })
                }).then(r => r.json()).then(d => { if(d.content) currentFileSha = d.content.sha; });
            } catch(e) {}
        }

        // --- 业务 ---
        const getMy = () => globalDB.accounts[currentUser];

        document.getElementById('addBtn').onclick = async () => {
            const content = document.getElementById('planContent').value.trim();
            if(!content) return;
            const date = document.getElementById('datePicker').value;
            const db = getMy();
            if(!db.plans[date]) db.plans[date] = [];
            
            db.plans[date].push({
                id: Date.now(),
                time: `${document.getElementById('startHour').value} - ${document.getElementById('endHour').value}`,
                category: document.getElementById('planCategory').value,
                content,
                completed: false,
                accomplishment: '' // 完成描述
            });
            
            db.plans[date].sort((a,b) => a.time.localeCompare(b.time));
            document.getElementById('planContent').value = '';
            renderAll();
            switchTab('list');
            await pushGlobalDB();
        };

        function renderList() {
            const date = document.getElementById('datePicker').value;
            const plans = getMy().plans[date] || [];
            const list = document.getElementById('planList');
            
            list.innerHTML = plans.map(p => `
                <div class="glass-card p-4 space-y-3">
                    <div class="flex items-start gap-3">
                        <input type="checkbox" ${p.completed ? 'checked' : ''} onchange="togglePlan(${p.id})" class="mt-1 w-6 h-6 rounded-full border-slate-300">
                        <div class="flex-grow">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-[9px] font-black text-blue-500 uppercase bg-blue-50 px-1.5 py-0.5 rounded">${p.category}</span>
                                <span class="text-[10px] text-slate-400 font-bold">${p.time}</span>
                            </div>
                            <h3 class="text-slate-800 font-bold ${p.completed ? 'line-through text-slate-400' : ''}">${p.content}</h3>
                        </div>
                        <button onclick="deletePlan(${p.id})" class="text-slate-300">×</button>
                    </div>
                    <textarea onblur="updateAccomplishment(${p.id}, this.value)" 
                        class="w-full bg-slate-50 border-none rounded-lg p-2 text-xs text-slate-600 focus:ring-1 focus:ring-blue-200" 
                        placeholder="记录完成情况或备注...">${p.accomplishment || ''}</textarea>
                </div>
            `).join(plans.length ? '' : '<div class="py-20 text-center text-slate-400 text-sm">今日暂无计划，点击下方“添加”开始</div>');

            // 总结
            const sum = getMy().summaries[date] || { text: '', mood: '' };
            document.getElementById('dailySummaryText').value = sum.text || '';
            document.querySelectorAll('.mood-btn').forEach(b => {
                b.classList.toggle('active', b.id === 'mood-' + sum.mood);
            });
        }

        // 智能建议生成
        function updateSuggestions() {
            const db = getMy();
            const allHistory = Object.values(db.plans).flat();
            const uniqueMap = new Map();
            allHistory.forEach(p => {
                if(!uniqueMap.has(p.content)) uniqueMap.set(p.content, p.category);
            });

            const box = document.getElementById('suggestionBox');
            box.innerHTML = Array.from(uniqueMap.entries()).map(([content, cat]) => `
                <div class="suggestion-chip" onclick="applySuggestion('${content}', '${cat}')">${content}</div>
            `).join('');
        }

        function applySuggestion(content, category) {
            document.getElementById('planContent').value = content;
            document.getElementById('planCategory').value = category;
            showToast("已自动匹配类别：" + category);
        }

        async function updateAccomplishment(id, val) {
            const date = document.getElementById('datePicker').value;
            getMy().plans[date] = getMy().plans[date].map(p => p.id === id ? {...p, accomplishment: val} : p);
            await pushGlobalDB();
        }

        async function togglePlan(id) {
            const date = document.getElementById('datePicker').value;
            getMy().plans[date] = getMy().plans[date].map(p => p.id === id ? {...p, completed: !p.completed} : p);
            renderAll();
            await pushGlobalDB();
        }

        async function deletePlan(id) {
            const date = document.getElementById('datePicker').value;
            getMy().plans[date] = getMy().plans[date].filter(p => p.id !== id);
            renderAll();
            await pushGlobalDB();
        }

        async function setMood(m) {
            const date = document.getElementById('datePicker').value;
            if(!getMy().summaries[date]) getMy().summaries[date] = { text: '', mood: '' };
            getMy().summaries[date].mood = m;
            renderAll();
            await pushGlobalDB();
        }

        async function saveCurrentSummary() {
            const date = document.getElementById('datePicker').value;
            const text = document.getElementById('dailySummaryText').value;
            if(!getMy().summaries[date]) getMy().summaries[date] = { text: '', mood: '' };
            getMy().summaries[date].text = text;
            await pushGlobalDB();
        }

        // --- 流水统计 ---
        function renderHistoryFlow() {
            const db = getMy();
            const sortedDates = Object.keys(db.plans).sort((a,b) => b.localeCompare(a));
            const flowContainer = document.getElementById('fullHistoryList');
            
            flowContainer.innerHTML = sortedDates.map(date => {
                const plans = db.plans[date];
                const summary = db.summaries[date];
                return `
                    <div class="border-l-2 border-blue-200 pl-4 relative">
                        <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-blue-500 border-4 border-white"></div>
                        <h4 class="text-sm font-black text-slate-800 mb-3">${date} ${summary?.mood || ''}</h4>
                        <div class="space-y-3">
                            ${plans.map(p => `
                                <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-100">
                                    <div class="flex justify-between text-[10px] font-bold text-slate-400 mb-1">
                                        <span>${p.time}</span>
                                        <span>${p.completed ? '✅ 已完成' : '⭕ 未完成'}</span>
                                    </div>
                                    <p class="text-sm font-bold text-slate-700">${p.content}</p>
                                    ${p.accomplishment ? `<p class="text-[11px] text-slate-500 mt-1 italic border-t border-slate-50 pt-1">笔记: ${p.accomplishment}</p>` : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join(sortedDates.length ? '' : '<p class="text-center text-slate-400 py-10">暂无历史记录</p>');

            // 图表
            const stats = { '学习': 0, '健身': 0, '娱乐': 0, '生活': 0 };
            let total = 0;
            Object.values(db.plans).flat().forEach(p => { stats[p.category]++; total++; });
            document.getElementById('categoryChart').innerHTML = Object.entries(stats).map(([c, v]) => `
                <div class="flex justify-between text-[10px] font-bold mb-1"><span>${c}</span><span>${v}</span></div>
                <div class="bg-slate-100 h-1.5 rounded-full overflow-hidden"><div class="bg-blue-600 h-full" style="width: ${total ? (v/total)*100 : 0}%"></div></div>
            `).join('');
        }

        // --- 工具 ---
        function initDateStrip() {
            const strip = document.getElementById('dateStrip');
            const today = new Date();
            const todayStr = today.toLocaleDateString('en-CA');
            document.getElementById('datePicker').value = todayStr;
            let html = '';
            for(let i = -7; i <= 14; i++) {
                const d = new Date(); d.setDate(today.getDate() + i);
                const dStr = d.toLocaleDateString('en-CA');
                html += `<div class="date-card ${dStr === todayStr ? 'active' : ''}" id="d-${dStr}" onclick="selectDate('${dStr}')">
                    <span class="text-[10px] font-bold">${d.toLocaleDateString('zh-CN',{weekday:'short'})}</span>
                    <span class="text-lg font-black">${d.getDate()}</span>
                </div>`;
            }
            strip.innerHTML = html;
        }

        function selectDate(dStr) {
            document.querySelectorAll('.date-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`d-${dStr}`)?.classList.add('active');
            document.getElementById('datePicker').value = dStr;
            renderAll();
        }

        function initTimeSelectors() {
            let h = '';
            for(let i=0; i<24; i++) {
                const hh = String(i).padStart(2,'0') + ':00';
                h += `<option value="${hh}">${hh}</option>`;
            }
            document.getElementById('startHour').innerHTML = h;
            document.getElementById('endHour').innerHTML = h;
        }

        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.querySelectorAll('.tab-item').forEach(i => i.classList.remove('active'));
            const idx = { list:0, add:1, data:2, settings:3 }[id];
            document.querySelectorAll('.tab-item')[idx].classList.add('active');
            if(id === 'add') updateSuggestions();
            if(id === 'data') renderHistoryFlow();
        }

        function renderAll() { if(currentUser) renderList(); }

        function setSyncUI(loading, text) {
            document.getElementById('syncText').innerText = text;
            document.getElementById('syncStatus').style.background = loading ? '#f59e0b' : '#059669';
        }

        async function manualSync() {
            setSyncUI(true, "刷新中...");
            await fetchGlobalDB();
            renderAll();
            setSyncUI(false, "已同步最新");
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.classList.remove('opacity-0');
            setTimeout(() => t.classList.add('opacity-0'), 2000);
        }

        function saveGHConfig() {
            ghConfig = {
                token: document.getElementById('ghToken').value.trim(),
                user: document.getElementById('ghUser').value.trim(),
                repo: document.getElementById('ghRepo').value.trim(),
                file: PRESET_GH_CONFIG.file
            };
            localStorage.setItem('gh_sync_config', JSON.stringify(ghConfig));
            location.reload();
        }
    </script>
</body>
</html>
